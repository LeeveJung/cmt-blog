styles:
  templates:
    layoutRootPath: 'EXT:sitepackage/Resources/Private/ContentElements/Layouts/'
    partialRootPath: 'EXT:sitepackage/Resources/Private/ContentElements/Partials/'
    templateRootPath: 'EXT:sitepackage/Resources/Private/ContentElements/Templates/'

page:
  pageview:
    paths: 'EXT:sitepackage/Resources/Private/PageView/'

  meta:
    viewport: 'width=device-width, initial-scale=1'
    robots: 'index,follow'
    apple-mobile-web-app-capable: 'no'
    compatible: 'IE=edge'

  tracking:
    google:
      trackingID: ''
      anonymizeIp: '1'


config:
  no_cache: '0'
  removeDefaultJS: '0'
  admPanel: '1'
  prefixLocalAnchors: 'all'
  headerComment: 'build by get.typo3.org/sitepackage'
  sendCacheHeaders: '1'

website:
  description: 'Erfahrungsblog zum Leben mit Charcot-Marie-Tooth (CMT) - persönliche Einblicke, Alltagstipps und Hintergrundwissen zu dieser seltenen Nervenerkrankung.'
  descriptionEn: 'A personal blog about living with Charcot-Marie-Tooth (CMT) – insights, everyday tips, and background knowledge on this rare nerve disease.'

author:
  name: 'Christoph Brauer'
  description: 'Ich bin Christoph Brauer, Webentwickler aus Bonn. Ich lebe mit Charcot-Marie-Tooth und schreibe auf leben-mit-cmt.de über meinen Alltag mit der Erkrankung.'
  descriptionEn: "I'm Christoph Brauer, a web developer from Bonn, Germany. I live with Charcot-Marie-Tooth and write about my everyday life with the condition on leben-mit-cmt.de."
  instagramUrl: 'https://www.instagram.com/leben_mit_cmt/'
  linkedInUrl: 'https://www.linkedin.com/in/christoph-brauer-13ba751b6/'
  knowsAbout: 'Hereditäre Neuropathie,Leben mit chronischer Erkrankung,Fußheberorthesen,Barrierefreies Webdesign'
  knowsAboutEn: 'Hereditary neuropathy,Living with chronic illness,Ankle-foot orthoses,Web accessibility'
  imageAlt: 'Porträtfoto von Christoph Brauer, Autor von leben-mit-cmt.de'
  imageAltEn: 'Portrait of Christoph Brauer, author of leben-mit-cmt.de'
  imageFalUid: '4'
  aboutPageUid: '19'
