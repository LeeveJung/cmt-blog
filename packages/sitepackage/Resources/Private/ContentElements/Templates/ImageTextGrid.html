<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers" data-namespace-typo3-fluid="true">

<section class="min-h-[409px] flex items-center bg-white" aria-label="{data.header}" id="c{data.uid}">
    <div class="max-w-7xl mx-auto w-full{f:if(condition: '{data.tx_sitepackage_no_padding}', else: ' py-12')} flex flex-col md:flex-row {data.tx_sitepackage_vertical_align} gap-12">
        <f:if condition="{data.layout} == 0">
            <f:then>
                <div class="md:w-2/3 space-y-6">
                    <f:for each="{imageColumn}" as="element">
                        <f:format.raw>{element.renderedContent}</f:format.raw>
                    </f:for>
                </div>
                <div class="md:w-1/3 relative">
                    <f:for each="{textColumn}" as="element">
                        <f:format.raw>{element.renderedContent}</f:format.raw>
                    </f:for>
                </div>
            </f:then>
            <f:else>
                <f:if condition="{data.layout} == 1">
                    <f:then>
                        <div class="md:w-1/3 relative">
                            <f:for each="{imageColumn}" as="element">
                                <f:format.raw>{element.renderedContent}</f:format.raw>
                            </f:for>
                        </div>
                        <div class="md:w-2/3 space-y-6">
                            <f:for each="{textColumn}" as="element">
                                <f:format.raw>{element.renderedContent}</f:format.raw>
                            </f:for>
                        </div>
                    </f:then>
                    <f:else>
                        <div class="md:w-1/2 space-y-6">
                            <f:for each="{imageColumn}" as="element">
                                <f:format.raw>{element.renderedContent}</f:format.raw>
                            </f:for>
                        </div>
                        <div class="md:w-1/2 space-y-6">
                            <f:for each="{textColumn}" as="element">
                                <f:format.raw>{element.renderedContent}</f:format.raw>
                            </f:for>
                        </div>
                    </f:else>
                </f:if>
            </f:else>
        </f:if>
    </div>
</section>

<f:if condition="{data.tx_sitepackage_show_divider}">
    <div class="max-w-7xl mx-auto">
        <hr class="border-t-0 border-b border-slate-500/30">
    </div>
</f:if>


</html>
