<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers" data-namespace-typo3-fluid="true">
<img
    class="image-embed-item"
    srcset="{f:uri.image(image: file, maxWidth: 350)} 400w, {f:uri.image(image: file, maxWidth: 700)} 700w, {f:uri.image(image: file, maxWidth: 900)} 900w, {f:uri.image(image: file, maxWidth: 1200)} 1200w"
    sizes="(max-width: {dimensions.width}px) 100vw, {dimensions.width}px"
    src="{f:uri.image(image: file, maxWidth: 1200)}"
    width="{dimensions.width}"
    height="{dimensions.height}"
    alt="{file.alternative}"
    title="{file.title}"
    loading="{f:if(condition: file.properties.tx_sitepackage_loading, then: file.properties.tx_sitepackage_loading, else: settings.media.lazyLoading)}"
    decoding="{settings.media.imageDecoding}"
    <f:if condition="{file.properties.tx_sitepackage_fetchpriority}">fetchpriority="{file.properties.tx_sitepackage_fetchpriority}"</f:if>
/>
</html>
