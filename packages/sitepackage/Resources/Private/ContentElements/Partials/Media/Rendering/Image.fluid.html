<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers" data-namespace-typo3-fluid="true">
<img
    class="image-embed-item"
    srcset="{f:uri.image(image: file, maxWidth: 400)} 400w, {f:uri.image(image: file, maxWidth: 700)} 700w, {f:uri.image(image: file, maxWidth: 900)} 900w, {f:uri.image(image: file, maxWidth: 1200)} 1200w"
    sizes="(max-width: 1280px) calc(100vw - 3rem), 1232px"
    src="{f:uri.image(image: file, maxWidth: 1200)}"
    width="{dimensions.width}"
    height="{dimensions.height}"
    alt="{file.alternative}"
    title="{file.title}"
    loading="{settings.media.lazyLoading}"
    decoding="{settings.media.imageDecoding}"
/>
</html>
