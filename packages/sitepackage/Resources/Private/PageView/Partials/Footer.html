<footer class="w-full mt-20 bg-white dark:bg-zinc-950 border-t border-slate-300 dark:border-slate-800">
    <div class="flex flex-col md:flex-row justify-between items-start w-full py-12 gap-8 max-w-7xl mx-auto px-6">
        <div class="max-w-md space-y-6">
            <p class="font-sans text-base tracking-wide leading-relaxed text-slate-900 dark:text-slate-400">
                © {f:format.date(date: 'now', format: 'Y')} leben-mit-cmt.de.
            </p>
            <p class="font-sans text-base tracking-wide leading-relaxed text-slate-900 dark:text-slate-400">
                <f:format.raw><f:translate key="LLL:EXT:sitepackage/Resources/Private/Language/locallang.xlf:footer.disclaimer" /></f:format.raw>
            </p>
        </div>
        <div class="flex flex-wrap gap-x-12 gap-y-4">
            <nav class="flex flex-col gap-3" aria-labelledby="headline_legal_footer">
                <h4 class="text-xl font-serif text-red-900 dark:text-red-400 font-bold mb-2" id="headline_legal_footer"><f:translate key="LLL:EXT:sitepackage/Resources/Private/Language/locallang.xlf:footer.nav.legal" /></h4>
                <ul class="flex flex-col flex-wrap gap">
                    <f:for as="item" each="{footernavigation}">
                        <li>
                            <f:link.page pageUid="{item.data.uid}" class="text-slate-900 dark:text-slate-400 hover:text-red-900 dark:hover:text-red-300 hover:underline transition-all font-sans text-base tracking-wide">{item.title}</f:link.page>
                        </li>
                    </f:for>
                </ul>
            </nav>
            <nav class="flex flex-col gap-3" aria-labelledby="headline_navi_footer">
                <h4 class="text-xl font-serif text-red-900 dark:text-red-400 font-bold mb-2" id="headline_navi_footer"><f:translate key="LLL:EXT:sitepackage/Resources/Private/Language/locallang.xlf:footer.nav.navigation" /></h4>
                <ul class="flex flex-col flex-wrap gap">
                    <f:for as="item" each="{footernavigation}">
                        <li>
                            <f:link.page pageUid="{item.data.uid}" class="text-slate-900 dark:text-slate-400 hover:text-red-900 dark:hover:text-red-300 hover:underline transition-all font-sans text-base tracking-wide">{item.title}</f:link.page>
                        </li>
                    </f:for>
                </ul>
            </nav>
        </div>
    </div>
</footer>
