        <div class="max-w-md space-y-6">
            <p class="font-sans text-base tracking-wide leading-relaxed text-slate-900 dark:text-slate-400">
                © {f:format.date(date: 'now', format: 'Y')} leben-mit-cmt.de.
            </p>
            <p class="font-sans text-base tracking-wide leading-relaxed text-slate-900 dark:text-slate-400">
