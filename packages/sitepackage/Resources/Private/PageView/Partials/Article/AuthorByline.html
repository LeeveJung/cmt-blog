<div class="author-byline flex flex-wrap items-center gap-x-4 gap-y-1 text-base text-slate-500 font-sans border-l-4 border-[#650009] bg-red-50 px-4 py-2.5 rounded-r-md mb-8">
    <span class="flex items-center gap-1.5">
        <span class="material-symbols-outlined text-lg leading-none">person</span>
        <a href="{f:uri.page(pageUid: 19, absolute: 0)}" rel="author" class="font-semibold text-slate-700 hover:text-[#650009] no-underline transition-colors">{authorName}</a>
    </span>
    <span class="flex items-center gap-1.5">
        <span class="material-symbols-outlined text-lg leading-none">calendar_today</span>
        <time datetime="{f:format.date(date: publishDate, format: 'Y-m-d')}">{publishDateFormatted}</time>
    </span>
    <f:if condition="{categories}">
        <span class="flex items-center gap-1.5">
            <span class="material-symbols-outlined text-lg leading-none">category</span>
            <f:for each="{categories}" as="category" iteration="i">
                <f:if condition="{i.isFirst -> f:format.raw()}"><f:else><span aria-hidden="true">,</span> </f:else></f:if>
                <span>{category.title}</span>
            </f:for>
        </span>
    </f:if>
</div>
