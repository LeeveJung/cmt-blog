<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers" data-namespace-typo3-fluid="true">


<section class="max-w-7xl mx-auto py-12 md:py-20">
    <f:if condition="{data.header}">
        <h2 class="mb-12">{data.header}</h2>
    </f:if>
    <f:if condition="{blogPosts}">
        <f:then>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-12">
                <f:for each="{blogPosts}" as="post">
                    <f:link.page pageUid="{post.uid}" class="group block no-underline h-full">
                        <article class="flex flex-col h-full bg-white rounded-xl overflow-hidden border border-zinc-200 group-hover:border-zinc-500 transition-all duration-300">
                            <f:if condition="{post.teaser_image}">
                                <div class="aspect-video overflow-hidden">
                                    <f:image image="{post.teaser_image}" maxWidth="800" height="360" fileExtension="webp" fetchpriority="high" alt="{post.title}" class="w-full h-full aspect-video object-cover group-hover:scale-105 transition-transform duration-300" />
                                </div>
                            </f:if>

                            <div class="flex-1 p-6 space-y-4">
                                <div class="flex gap-3">
                                    <f:for each="{post.categories}" as="category">
                                        <span class="bg-red-50 text-red-800 px-3 py-1 rounded-full text-[10px] font-bold tracking-wider uppercase border border-red-100">
                                            {category.title}
                                        </span>
                                    </f:for>
                                    <span class="text-zinc-400 text-xs font-sans mt-1">
                                        <time datetime="{f:format.date(date: post.display_date, format: 'd.m.Y')}" class="text-sm text-slate-700">
                                            {post.display_date_formatted}
                                        </time>
                                    </span>
                                </div>

                                <h3 class="text-2xl font-serif font-bold leading-snug group-hover:text-red-800 transition-colors">
                                    {post.title}
                                </h3>

                                <f:if condition="{post.description}">
                                    <p class="text-zinc-600 font-sans line-clamp-3 leading-relaxed">{post.description}</p>
                                </f:if>
                            </div>
                        </article>
                    </f:link.page>
                </f:for>
            </div>
            <f:if condition="{data.brauer_overview_link}">
                <div class="flex justify-center mt-12">
                    <f:link.typolink parameter="{data.brauer_overview_link}" class="inline-flex items-center gap-2 px-6 py-3 rounded-xl border-2 border-[#650009] text-[#650009] font-sans font-semibold text-sm tracking-wide uppercase hover:bg-[#650009] hover:text-white hover:no-underline transition-colors duration-100">
                        <f:translate key="LLL:EXT:sitepackage/Resources/Private/Language/locallang.xlf:blog_list.overview_link" />
                    </f:link.typolink>
                </div>
            </f:if>
        </f:then>
        <f:else>
            <p class="text-slate-500">Noch keine Beiträge vorhanden.</p>
        </f:else>
    </f:if>
</section>
</html>
