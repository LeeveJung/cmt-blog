<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers" data-namespace-typo3-fluid="true">

<f:if condition="{data.brauer_page.0}">
    <f:variable name="linkedPage" value="{data.brauer_page.0}" />
    <aside class="my-8 flex items-start gap-4 rounded-xl border border-primary/20 bg-primary/5 px-6 py-5 font-sans">
        <svg class="inline-block shrink-0 text-2xl text-primary mt-0.5" width="1em" height="1em" viewBox="0 -960 960 960" fill="currentColor" aria-hidden="true"><path d="M686-450H160v-60h526L438-758l42-42 320 320-320 320-42-42 248-248Z"/></svg>
        <p class="text-base text-slate-700 leading-relaxed">
            <f:if condition="{data.brauer_intro_text}">
                {data.brauer_intro_text}&nbsp;
            </f:if>
            <f:link.page pageUid="{linkedPage.uid}" rel="related" additionalAttributes="{itemprop: 'relatedLink'}" class="font-bold text-primary hover:underline"><f:translate key="LLL:EXT:sitepackage/Resources/Private/Language/locallang.xlf:article_link.quote.open" />{linkedPage.title}<f:translate key="LLL:EXT:sitepackage/Resources/Private/Language/locallang.xlf:article_link.quote.close" /></f:link.page>
        </p>
    </aside>
</f:if>

</html>
